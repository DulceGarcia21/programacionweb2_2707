<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de usuarios desde JSON</title>
</head>
<body>
    <h2>Gestor de usuarios desde JSON</h2>
    <!-- formulario para agregar usuarios -->
    <form id="formUsuario">
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre"><br>
        <label for="correo">Correo electrónico:</label>
        <input type="email" id="correo" name="correo"><br>
        <button type="submit">Guardar</button>>
    </form>
        <br>
    <!-- Importar usuarios desde un archivo JSON -->
    <input type="file" id="importarJSON" accept=".json">
    <!--descargar JSON-->
    <button id="descargarBtn">Descargar Usuarios</button>
    <br>
    <hr>
    <h3>Usuarios registrados</h3>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Correo electrónico</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tablaUsuarios">
            <!-- Aquí se agregarán los usuarios -->
        </tbody>
    </table>
</body>
<script src="./app.js"></script>
</html>
